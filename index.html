<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGU Cortes Connect | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-900">
    <div class="max-w-lg mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        
        <div class="bg-blue-800 p-6 text-center text-white">
            <img src="images/cortes.jpg" alt="Logo" class="w-20 h-20 rounded-full mx-auto mb-3 border-2 border-white object-cover">
            <h1 class="text-2xl font-black tracking-tighter uppercase">LGU Cortes Connect</h1>
            <p class="text-[10px] opacity-80 font-bold tracking-widest uppercase">Citizen Services Portal</p>
        </div>

        <div id="authSection" class="p-8">
            <h2 id="authTitle" class="text-xl font-bold mb-6 text-center">Citizen Access</h2>
            <div class="space-y-4">
                <input id="authEmail" type="email" placeholder="Email Address" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                
                <div class="space-y-1">
                    <input id="authPass" type="password" placeholder="Password" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <div class="flex items-center gap-2 ml-1 mt-1">
                        <input type="checkbox" id="showPassToggle" onclick="togglePasswordVisibility()" class="w-3.5 h-3.5 rounded border-slate-300 text-blue-700 focus:ring-blue-500 cursor-pointer">
                        <label for="showPassToggle" class="text-[10px] font-black text-slate-500 uppercase cursor-pointer select-none">Show Password</label>
                    </div>
                </div>

                <button id="mainAuthBtn" onclick="handleAuth()" class="w-full bg-blue-700 text-white p-3 rounded-xl font-black hover:bg-blue-800 transition shadow-lg">LOGIN</button>
                <p class="text-center text-sm text-slate-500">
                    <span id="toggleText">New to the portal?</span>
                    <button onclick="toggleAuthMode()" id="toggleBtn" class="text-blue-700 font-bold ml-1 hover:underline">Create Account</button>
                </p>
            </div>
        </div>

        <div id="appSection" class="hidden p-8 animate-in fade-in slide-in-from-bottom-4 duration-500">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Logged in as:</p>
                    <p id="userDisplayEmail" class="text-xs font-bold text-blue-800"></p>
                </div>
                <button onclick="logout()" class="text-[10px] bg-slate-100 px-3 py-1.5 rounded-lg font-black hover:bg-red-50 hover:text-red-600 transition">LOGOUT</button>
            </div>

            <h3 class="font-black text-slate-800 mb-4 uppercase tracking-tight">Book an Appointment</h3>
            <div class="space-y-4 bg-slate-50 p-6 rounded-2xl border border-slate-100 shadow-inner">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Full Name</label>
                    <input id="citizenFullName" type="text" placeholder="Juan Dela Cruz" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Contact Number</label>
                    <input id="citizenContact" type="tel" placeholder="0912 345 6789" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Required Service</label>
                    <select id="serviceType" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option>Cedula</option>
                        <option>Barangay Clearance</option>
                        <option>Business Permit (New/Renewal)</option>
                        <option>Birth Certificate Request</option>
                        <option>Senior Citizen ID Request</option>
                    </select>
                </div>
                <button onclick="submitRequest()" class="w-full bg-blue-700 text-white p-4 rounded-xl font-black hover:bg-blue-800 transition shadow-xl active:scale-95">SUBMIT APPOINTMENT</button>
            </div>

            <div class="mt-10">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Request History & Status</h4>
                <div id="userStatus" class="space-y-3"></div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
