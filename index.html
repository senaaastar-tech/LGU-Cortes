<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGU Cortes Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 font-sans">
    <div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-md text-slate-900 border-t-8 border-blue-600">
        <div class="flex flex-col items-center justify-center mb-6 border-b pb-4">
            <img src="images/cortes.jpg" alt="LGU Cortes Logo" class="w-24 h-24 rounded-full shadow-md border-2 border-gray-200 mb-3 object-cover">
            <h1 class="text-2xl font-bold text-blue-800 text-center uppercase tracking-tight">LGU Cortes Connect</h1>
            <p class="text-xs text-gray-500 font-semibold text-center">Bohol Island State University - Project</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Full Name</label>
                <input id="userName" type="text" placeholder="Enter your name" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Service Required</label>
                <select id="serviceType" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-sm">
                    <option>Cedula</option>
                    <option>Barangay Clearance</option>
                    <option>Business Permit</option>
                    <option>Birth Certificate Request</option>
                </select>
            </div>
            
            <button onclick="submitRequest()" class="w-full bg-blue-700 text-white p-3 rounded-lg font-bold hover:bg-blue-800 transition-all shadow-md active:scale-95">
                SUBMIT REQUEST
            </button>
        </div>
        
        <div class="mt-8 pt-6 border-t border-gray-100">
            <h2 class="font-bold text-sm text-blue-900 mb-3 flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                LIVE STATUS TRACKER
            </h2>
            <div id="userStatus" class="text-xs space-y-2 p-3 bg-blue-50 rounded-lg border border-blue-100 max-h-40 overflow-y-auto">
                <p class="text-gray-400 italic">No requests found...</p>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
