<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGU Cortes Connect | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 font-sans text-slate-900">
    <div class="max-w-lg mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden border border-slate-200">
        
        <!-- Header Section -->
        <div class="bg-blue-800 p-6 text-center text-white">
            <img src="images/cortes.jpg" alt="Logo" class="w-20 h-20 rounded-full mx-auto mb-3 border-2 border-white object-cover">
            <h1 class="text-2xl font-black tracking-tighter uppercase">LGU Cortes Connect</h1>
            <p class="text-[10px] opacity-80 font-bold tracking-widest uppercase">Citizen Services Portal</p>
        </div>

        <!-- AUTH SECTION -->
        <div id="authSection" class="p-8">
            <h2 id="authTitle" class="text-xl font-bold mb-6 text-center">Citizen Login</h2>
            <div class="space-y-4">
                <input id="authEmail" type="email" placeholder="Email Address" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                
                <div class="space-y-1">
                    <input id="authPass" type="password" placeholder="Password" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    <div class="flex items-center gap-2 ml-1 mt-1">
                        <input type="checkbox" id="showPassToggle" onclick="togglePasswordVisibility()" class="w-3.5 h-3.5 rounded border-slate-300 text-blue-700 focus:ring-blue-500 cursor-pointer">
                        <label for="showPassToggle" class="text-[10px] font-black text-slate-500 uppercase cursor-pointer select-none">Show Password</label>
                    </div>
                </div>

                <button id="mainAuthBtn" onclick="handleAuth()" class="w-full bg-blue-700 text-white p-3 rounded-xl font-black hover:bg-blue-800 transition shadow-lg">LOGIN</button>
                <p class="text-center text-sm text-slate-500 pt-2">
                    <span id="toggleText">New to the portal?</span>
                    <button onclick="toggleAuthMode()" id="toggleBtn" class="text-blue-700 font-bold ml-1 hover:underline">Create Account</button>
                </p>
            </div>
        </div>

        <!-- APP SECTION (Dashboard) -->
        <div id="appSection" class="hidden p-8 animate-in fade-in duration-500">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <div>
                    <p class="text-[10px] font-black text-slate-400 uppercase">Logged in as:</p>
                    <p id="userDisplayEmail" class="text-xs font-bold text-blue-800"></p>
                </div>
                <button onclick="logout()" class="text-[10px] bg-slate-100 px-3 py-1.5 rounded-lg font-black hover:bg-red-50 hover:text-red-600 transition">LOGOUT</button>
            </div>

            <h3 class="font-black text-slate-800 mb-4 uppercase tracking-tight">Book an Appointment</h3>
            <div class="space-y-4 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Full Name</label>
                    <input id="citizenFullName" type="text" placeholder="Juan Dela Cruz" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Contact Number</label>
                    <input id="citizenContact" type="text" placeholder="09123456789" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Select Service</label>
                    <select id="serviceType" onchange="updateRequirements()" class="w-full p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500 bg-white font-bold text-sm">
                        <option value="">-- Choose a Service --</option>
                        <optgroup label="Local Civil Registrar (LCRO)">
                            <option value="birth_cert">Birth Certificate Request</option>
                            <option value="marriage_license">Marriage License Application</option>
                            <option value="correction_error">Correction of Clerical Error</option>
                            <option value="change_name">Petition: Change of First Name</option>
                        </optgroup>
                        <optgroup label="DTI / Negosyo Center">
                            <option value="business_counseling">Business Counseling / Form</option>
                        </optgroup>
                    </select>
                </div>

                <!-- Requirement Box -->
                <div id="requirementBox" class="hidden bg-blue-50 border border-blue-200 p-4 rounded-xl">
                    <p class="text-[9px] font-black text-blue-800 uppercase mb-1">Assigned Office:</p>
                    <p id="targetOffice" class="text-[11px] font-bold text-slate-700 mb-3"></p>
                    <p class="text-[9px] font-black text-blue-800 uppercase mb-1">Required Documents:</p>
                    <ul id="reqList" class="text-[11px] text-slate-600 space-y-1 list-disc ml-4"></ul>
                </div>

                <button onclick="submitRequest()" class="w-full bg-blue-700 text-white p-4 rounded-xl font-black hover:bg-blue-800 transition shadow-xl">SUBMIT APPOINTMENT</button>
            </div>

            <!-- Status Section -->
            <div class="mt-8">
                <h3 class="font-black text-slate-800 mb-4 uppercase tracking-tight text-sm">My Appointments</h3>
                <div id="userStatus" class="space-y-3">
                    <!-- Dynamic user requests here -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
