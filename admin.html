<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGU Staff Dashboard | Cortes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 p-5 text-white font-sans">
    
    <div id="loginSection" class="max-w-sm mx-auto mt-24 p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 text-center">
        <img src="images/cortes.jpg" alt="Logo" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-slate-700 object-cover">
        <h2 class="text-xl font-black mb-6 text-blue-400 uppercase tracking-widest">OFFICIAL STAFF LOGIN</h2>
        <input id="adminPass" type="password" placeholder="System Password" class="w-full p-3 mb-4 rounded-lg bg-slate-800 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-black transition-all shadow-lg active:scale-95">ACCESS SYSTEM</button>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto animate-in slide-in-from-top duration-500">
        <header class="flex justify-between items-center mb-8 bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <div class="flex items-center gap-5">
                <img src="images/cortes.jpg" alt="Logo" class="w-16 h-16 rounded-full border-2 border-slate-700 object-cover">
                <div>
                    <h1 class="text-2xl font-black text-white leading-none tracking-tight uppercase">Staff Management Dashboard</h1>
                    <p class="text-xs text-blue-500 font-bold mt-1 tracking-widest">LGU CORTES CONNECT v1.0</p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-red-900/30 text-red-400 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-800 hover:text-white transition uppercase">Logout</button>
        </header>

        <div class="grid gap-4">
            <div class="flex items-center justify-between px-2">
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Citizen Request Queue</h2>
                <div class="flex gap-2">
                    <span class="bg-blue-900/50 text-blue-400 text-[10px] px-2 py-1 rounded font-black">STABLE SYNC</span>
                </div>
            </div>
            <div id="adminList" class="grid gap-3 min-h-[200px]">
                <p class="text-slate-600 text-center mt-10 italic">Checking for new submissions...</p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        function checkAdmin() {
            if(document.getElementById('adminPass').value === "admin123") {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                if (window.loadAdminData) window.loadAdminData();
            } else { alert("INVALID SYSTEM PASSWORD"); }
        }
    </script>
</body>
</html>
