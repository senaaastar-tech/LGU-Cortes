<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Admin - LGU Cortes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 p-5 text-white font-sans">
    
    <div id="loginSection" class="max-w-sm mx-auto mt-24 p-8 bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 text-center">
        <img src="images/cortes.jpg" alt="Logo" class="w-20 h-20 rounded-full mx-auto mb-4 border-2 border-slate-700 object-cover">
        <h2 class="text-xl font-black mb-6 text-blue-400 uppercase tracking-widest">LGU STAFF LOGIN</h2>
        <input id="adminPass" type="password" placeholder="System Password" class="w-full p-3 mb-4 rounded-lg bg-slate-800 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 hover:bg-blue-500 p-3 rounded-lg font-black transition-all shadow-lg active:scale-95">
            LOGIN
        </button>
        <p class="text-[10px] text-slate-600 mt-4 uppercase">Restricted Access Only</p>
    </div>

    <div id="dashboard" class="hidden max-w-5xl mx-auto animate-in fade-in duration-500">
        <header class="flex justify-between items-center mb-8 bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-xl">
            <div class="flex items-center gap-5">
                <img src="images/cortes.jpg" alt="Logo" class="w-16 h-16 rounded-full border-2 border-slate-700 object-cover">
                <div>
                    <h1 class="text-2xl font-black text-white leading-none">OFFICIAL DASHBOARD</h1>
                    <p class="text-xs text-blue-500 font-bold mt-1 tracking-widest">LGU CORTES CONNECT</p>
                </div>
            </div>
            <button onclick="location.reload()" class="bg-slate-800 p-2 rounded-lg text-xs hover:bg-slate-700">Logout</button>
        </header>

        <div class="flex items-center justify-between mb-4">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Incoming Requests</h2>
            <span id="counter" class="bg-blue-600 text-[10px] px-2 py-0.5 rounded-full font-black">ACTIVE</span>
        </div>
        
        <div id="adminList" class="grid gap-3">
            <p class="text-slate-600 italic">Syncing with database...</p>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "admin123") {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                if (window.loadAdminData) window.loadAdminData();
            } else {
                alert("ACCESS DENIED: Wrong Password");
            }
        }
    </script>
</body>
</html>
